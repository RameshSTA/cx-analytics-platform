# Customer Experience Analytics Platform — Modelling Configuration
# =============================================================

segmentation:
  rfm:
    lookback_days: 365
    recency_weight: 1.0
    frequency_weight: 1.0
    monetary_weight: 1.0
  kmeans:
    k_range: [2, 10]
    optimal_k: 5
    max_iter: 500
    n_init: 20
    random_state: 42
  clv:
    horizon_months: 12
    train_fraction: 0.80
    xgboost:
      n_estimators: 400
      max_depth: 5
      learning_rate: 0.05
      subsample: 0.80
      colsample_bytree: 0.80
      reg_alpha: 0.1
      reg_lambda: 1.0
      random_state: 42

forecasting:
  aggregation_unit: "W-MON"    # ISO week, Monday start
  test_weeks: 4
  sarima:
    order: [1, 1, 1]
    seasonal_order: [1, 1, 1, 52]
    trend: "n"
  prophet:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    interval_width: 0.80
  lightgbm:
    n_estimators: 500
    num_leaves: 63
    learning_rate: 0.05
    min_data_in_leaf: 20
    feature_fraction: 0.80
    bagging_fraction: 0.80
    bagging_freq: 5
    random_state: 42
  lags: [1, 2, 4, 8, 52]
  rolling_windows: [4, 12]
  anomaly_detection:
    contamination: 0.05
    n_estimators: 100
    random_state: 42

nlp:
  preprocessing:
    max_review_length: 2000
    min_review_length: 20
    stopwords_lang: "english"
  vader:
    positive_threshold: 0.05
    negative_threshold: -0.05
  distilbert:
    model_name: "distilbert-base-uncased"
    max_length: 128
    batch_size: 32
    learning_rate: 2.0e-5
    num_epochs: 3
    warmup_steps: 100
  bertopic:
    embedding_model: "all-MiniLM-L6-v2"
    umap_n_neighbors: 15
    umap_n_components: 5
    hdbscan_min_cluster_size: 50
    nr_topics: "auto"

ab_testing:
  experiment:
    pre_period: ["2013-01-01", "2013-06-30"]
    post_period: ["2013-07-01", "2013-12-31"]
    promo2_start_year: 2013
    promo2_start_week_min: 27
    n_matched_pairs: 54
  tests:
    alpha: 0.10
    bootstrap_samples: 10000
  bayesian:
    prior_alpha: 1
    prior_beta: 1
    mcmc_samples: 2000
    random_seed: 42
