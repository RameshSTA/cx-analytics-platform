<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="45%"  stop-color="#122244"/>
      <stop offset="100%" stop-color="#1e3d7a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffc000" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ffc000" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#70ad47" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#2E75B6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E75B6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="svgClip">
      <rect width="1200" height="220"/>
    </clipPath>
  </defs>

  <style>
    @keyframes wave1 {
      0%   { transform: translateX(0px); }
      100% { transform: translateX(-1200px); }
    }
    @keyframes wave2 {
      0%   { transform: translateX(-400px); }
      100% { transform: translateX(-1600px); }
    }
    @keyframes wave3 {
      0%   { transform: translateX(-800px); }
      100% { transform: translateX(-2000px); }
    }
    @keyframes shimmer {
      0%   { opacity: 0.55; }
      50%  { opacity: 1.0; }
      100% { opacity: 0.55; }
    }
    .wv1 { animation: wave1 16s linear infinite; }
    .wv2 { animation: wave2 11s linear infinite; }
    .wv3 { animation: wave3  7s linear infinite; }
    .glow { animation: shimmer 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0"   y1="54"  x2="1200" y2="54"  stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0"   y1="108" x2="1200" y2="108" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0"   x2="300"  y2="150" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="600" y1="0"   x2="600"  y2="150" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="900" y1="0"   x2="900"  y2="150" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>

  <!-- Decorative ambient glow circles -->
  <circle cx="90"   cy="45"  r="100" fill="#2E75B6" fill-opacity="0.07"/>
  <circle cx="1110" cy="35"  r="120" fill="#2E75B6" fill-opacity="0.06"/>
  <circle cx="580"  cy="70"  r="160" fill="#1a4080" fill-opacity="0.08"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="220" fill="#ffc000" fill-opacity="0.85"/>

  <!-- Platform title -->
  <text x="30" y="72"
    font-family="'Segoe UI',Arial,Helvetica,sans-serif"
    font-size="36" font-weight="700" letter-spacing="0.3"
    fill="#ffffff">Customer Experience Analytics Platform</text>

  <!-- Subtitle -->
  <text x="30" y="100"
    font-family="'Segoe UI',Arial,Helvetica,sans-serif"
    font-size="14.5" font-weight="400"
    fill="rgba(170,205,255,0.87)">Multi-Module Customer Analytics  ·  Retail Data Science Portfolio</text>

  <!-- Shimmer accent line -->
  <rect x="30" y="110" width="720" height="2" rx="1" fill="url(#accentGrad)" class="glow"/>

  <!-- Module pills -->
  <rect x="30"  y="120" width="154" height="21" rx="10.5" fill="rgba(255,255,255,0.08)"/>
  <text x="107" y="134.5" text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.9"
    fill="rgba(195,220,255,0.88)">M1 · SEGMENTATION</text>

  <rect x="192" y="120" width="143" height="21" rx="10.5" fill="rgba(255,255,255,0.08)"/>
  <text x="263.5" y="134.5" text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.9"
    fill="rgba(195,220,255,0.88)">M2 · FORECASTING</text>

  <rect x="343" y="120" width="110" height="21" rx="10.5" fill="rgba(255,255,255,0.08)"/>
  <text x="398" y="134.5" text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.9"
    fill="rgba(195,220,255,0.88)">M3 · NLP / CX</text>

  <rect x="461" y="120" width="136" height="21" rx="10.5" fill="rgba(255,255,255,0.08)"/>
  <text x="529" y="134.5" text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.9"
    fill="rgba(195,220,255,0.88)">M4 · CAUSAL A/B</text>

  <!-- Author line -->
  <text x="30" y="155"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="10.5" fill="rgba(130,175,235,0.62)">
    Ramesh Shrestha  ·  Data Scientist  ·  Sydney, Australia  ·  March 2026
  </text>

  <!-- Animated waves — clipped to SVG bounds -->
  <g clip-path="url(#svgClip)">

    <!-- Wave 1 — back, lightest, slowest (16s) -->
    <g class="wv1">
      <path d="M 0,163 C 300,145 300,145 600,163 C 900,181 900,181 1200,163
               C 1500,145 1500,145 1800,163 C 2100,181 2100,181 2400,163
               L 2400,220 L 0,220 Z"
        fill="rgba(80,130,210,0.18)"/>
    </g>

    <!-- Wave 2 — middle (11s) -->
    <g class="wv2">
      <path d="M 0,173 C 300,159 300,159 600,173 C 900,187 900,187 1200,173
               C 1500,159 1500,159 1800,173 C 2100,187 2100,187 2400,173
               L 2400,220 L 0,220 Z"
        fill="rgba(45,85,158,0.38)"/>
    </g>

    <!-- Wave 3 — front, darkest, fastest (7s) -->
    <g class="wv3">
      <path d="M 0,183 C 300,173 300,173 600,183 C 900,193 900,193 1200,183
               C 1500,173 1500,173 1800,183 C 2100,193 2100,193 2400,183
               L 2400,220 L 0,220 Z"
        fill="rgba(10,28,72,0.65)"/>
    </g>

  </g>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>
</svg>
